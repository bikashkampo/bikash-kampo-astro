<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager</title>

</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    CMS.registerPreviewStyle("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,700;1,8..60,400&display=swap");

    CMS.registerPreviewStyle(`
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #1a1a1a;
        max-width: 720px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }
      .meta {
        font-size: 0.875rem;
        color: #999;
        margin-bottom: 0.75rem;
      }
      .meta .category {
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 0.05em;
        font-size: 0.75rem;
      }
      h1 {
        font-family: 'Source Serif 4', Georgia, serif;
        font-size: 2rem;
        font-weight: 700;
        line-height: 1.3;
        margin: 0 0 1.5rem 0;
      }
      .body-content p {
        color: #555;
        font-size: 1.0625rem;
        line-height: 1.8;
        margin-bottom: 1.5em;
      }
      .body-content h2 {
        font-family: 'Source Serif 4', Georgia, serif;
        font-size: 1.5rem;
        font-weight: 700;
        margin-top: 2.5em;
        margin-bottom: 0.75em;
        color: #1a1a1a;
      }
      .body-content h3 {
        font-family: 'Source Serif 4', Georgia, serif;
        font-size: 1.25rem;
        font-weight: 700;
        margin-top: 2em;
        margin-bottom: 0.5em;
        color: #1a1a1a;
      }
      .body-content a {
        color: #2563eb;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .body-content img {
        max-width: 100%;
        border-radius: 8px;
        margin: 2em 0;
      }
      .body-content blockquote {
        border-left: 3px solid #2563eb;
        padding-left: 1.25em;
        margin: 1.5em 0;
        color: #555;
        font-style: italic;
      }
      .body-content ul, .body-content ol {
        margin: 1.25em 0;
        padding-left: 1.5em;
      }
      .body-content li {
        margin-bottom: 0.5em;
        color: #555;
        font-size: 1.0625rem;
        line-height: 1.8;
      }
      .body-content strong {
        color: #1a1a1a;
        font-weight: 600;
      }
      .body-content code {
        background: #f8f8f8;
        padding: 0.15em 0.4em;
        border-radius: 4px;
        font-size: 0.9em;
      }
      .body-content pre {
        background: #1a1a2e;
        color: #e0e0e0;
        padding: 1.25em;
        border-radius: 8px;
        overflow-x: auto;
        margin: 1.5em 0;
      }
      .body-content hr {
        border: none;
        border-top: 1px solid #e5e5e5;
        margin: 2.5em 0;
      }
    `, { raw: true });

    var PostPreview = createClass({
      render: function() {
        var entry = this.props.entry;
        var category = entry.getIn(['data', 'category']) || '';
        var pubDate = entry.getIn(['data', 'pubDate']) || '';
        return h('div', {},
          h('div', { className: 'meta' },
            h('span', { className: 'category' }, category),
            category && pubDate ? h('span', {}, ' · ') : null,
            h('span', {}, pubDate)
          ),
          h('h1', {}, entry.getIn(['data', 'title'])),
          h('div', { className: 'body-content' }, this.props.widgetFor('body'))
        );
      }
    });
    CMS.registerPreviewTemplate('blog', PostPreview);
  </script>
</body>
</html>
